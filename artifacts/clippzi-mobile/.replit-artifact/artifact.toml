kind = "mobile"
previewPath = "/mobile/"
title = "Clippzi"
version = "1.0.0"
id = "artifacts/clippzi-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22167

[services.development]
run = "pnpm --filter @workspace/clippzi-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clippzi-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/clippzi-mobile", "run", "serve" ]

[services.env]
PORT = "22167"
BASE_PATH = "/mobile/"
