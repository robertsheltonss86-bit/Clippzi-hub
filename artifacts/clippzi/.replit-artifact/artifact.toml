kind = "web"
previewPath = "/"
title = "Clippzi"
version = "1.0.0"
id = "artifacts/clippzi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22170

[services.development]
run = "pnpm --filter @workspace/clippzi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clippzi", "run", "build" ]
publicDir = "artifacts/clippzi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22170"
BASE_PATH = "/"
